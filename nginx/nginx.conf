events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 300s;
    client_max_body_size 20M;

    # ── Streaming de video: sin buffering, timeouts largos ────────────────
    # Sin esto el reproductor de torrents se queda colgado en nginx
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout      3600s;   # 1 hora — streams de video pueden durar mucho
    proxy_send_timeout      3600s;
    proxy_connect_timeout     60s;

    # Upstream — Docker DNS resuelve "backend"
    upstream backend_pool {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP: funciona con IP pública (sin dominio) ───────────────────────
    server {
        listen 80;
        server_name _;

        # Certbot ACME challenge (dejar aquí para activar HTTPS con dominio después)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Seguridad básica
        add_header X-Content-Type-Options nosniff          always;
        add_header X-Frame-Options        SAMEORIGIN       always;
        add_header X-XSS-Protection       "1; mode=block"  always;

        location / {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";          # keep-alive upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS: descomentar cuando tengas dominio + certificados ──────────
    # server {
    #     listen 443 ssl http2;
    #     server_name TU_DOMINIO.com www.TU_DOMINIO.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #     add_header X-Frame-Options            SAMEORIGIN                            always;
    #     add_header X-Content-Type-Options     nosniff                               always;
