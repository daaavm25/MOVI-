events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Upstream — Docker DNS resuelve "backend" a todas las réplicas
    upstream backend_pool {
        server backend:8000;
    }

    # ── HTTP: redirige todo a HTTPS ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Certbot / Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name TU_DOMINIO.com www.TU_DOMINIO.com;   # <-- cambia esto

        ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        # Seguridad: headers obligatorios en producción
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options            DENY                                  always;
        add_header X-Content-Type-Options     nosniff                               always;
        add_header X-XSS-Protection           "1; mode=block"                       always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

        # Proxy a backend (sirve frontend + API en un solo puerto)
        location / {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
