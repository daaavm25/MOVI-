# docker-compose.prod.yml — Sobreescritura para PRODUCCIÓN
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Cubre los 5 puntos del pizarrón:
#   1. Persistencia   → volúmenes pgdata y webtorrent-data
#   2. Respaldos      → ver scripts/backup.sh
#   3. Disponibilidad → healthchecks + restart: always + nginx
#   4. Seguridad      → nginx TLS, no expone puertos DB/backend directamente
#   5. Escalabilidad  → backend con réplicas, nginx como load balancer

services:

  db:
    restart: always
    ports: []                 # DB NO expuesta al exterior en producción

  backend:
    restart: always
    ports: []                 # Solo accesible desde nginx (red interna)
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      DB_HOST: db
      DB_PORT: 5432
    deploy:
      replicas: 2             # Escalabilidad horizontal
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  frontend:
    restart: always
    ports: []                 # Solo accesible desde nginx

  # ── Nginx: reverse proxy + TLS + load balancer ───────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy

  # ── Certbot: obtiene/renueva certificados Let's Encrypt ──────────────────
  # Uso inicial:
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
  #     run --rm certbot certonly --webroot \
  #     --webroot-path=/var/www/certbot \
  #     --email TU_EMAIL@dominio.com \
  #     --agree-tos --no-eff-email \
  #     -d TU_DOMINIO.com
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    profiles:
      - certbot              # Solo se ejecuta cuando se llama explícitamente

volumes:
  certbot-conf:
  certbot-www:
