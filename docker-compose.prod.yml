# docker-compose.prod.yml — Sobreescritura para PRODUCCIÓN
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Qué añade sobre docker-compose.yml:
#   1. Persistencia   → volúmenes pgdata y webtorrent-data (heredados)
#   2. Disponibilidad → restart: always + nginx como único punto de entrada
#   3. Seguridad      → DB y backend NO exponen puertos al exterior
#   4. Streaming      → nginx con proxy_buffering off (video no se cuelga)

services:

  db:
    restart: always
    ports: []                 # DB NO expuesta al exterior en producción

  backend:
    restart: always
    ports: []                 # Solo accesible desde nginx (red Docker interna)
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      DB_HOST: db
      DB_PORT: 5432

  # ── Nginx: reverse proxy + balanceador de carga ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro          # certificados Let's Encrypt
      - /var/www/certbot:/var/www/certbot:ro           # renovaciones ACME
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
